<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#bg)"/>
  <!-- Shield icon -->
  <g transform="translate(40, 50)">
    <path d="M40 0 L80 15 L80 60 C80 90 40 100 40 100 C40 100 0 90 0 60 L0 15 Z" fill="url(#shield)" opacity="0.9"/>
    <path d="M25 45 L35 55 L55 35" stroke="#00d2ff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Lightning bolt -->
  <g transform="translate(180, 35)">
    <polygon points="60,0 20,55 40,55 15,100 70,40 45,40" fill="#e94560" opacity="0.9"/>
  </g>
  <!-- Text -->
  <text x="180" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">Cloudflare Bypass</text>
  <text x="180" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#8899aa">Turnstile bypass engine</text>
  <text x="180" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#556677">github.com/Radit-lab/cloudflare-bypass</text>
  <!-- Decorative circles -->
  <circle cx="350" cy="170" r="30" fill="#533483" opacity="0.15"/>
  <circle cx="370" cy="180" r="20" fill="#0f3460" opacity="0.1"/>
</svg>
